syntax = "proto3";
package game;

// 登录响应
message LoginResponse {
    int32 your_id = 1;
    float init_x = 2;
    float init_y = 3;
}

// 玩家输入
message PlayerInput {
    int32 player_id = 1;
    enum InputType {
        NONE = 0;
        UP = 1;
        DOWN = 2;
        LEFT = 3;
        RIGHT = 4;
        FIRE = 5;
	 RESPAWN = 6;
	 SUBMIT_SCORE = 7; // 提交分数的指令
    }
    InputType input = 2;
    string name = 3;      //  提交分数时附带的玩家名字
}

// 玩家状态
message PlayerState {
    int32 id = 1;
    float x = 2;
    float y = 3;
    float angle = 4; 
    int32 health =5;
    int32 score=6;
}

// 子弹状态 
message BulletState {
    int32 id = 1;
    float x = 2;
    float y = 3;
    int32 type = 4; // 0=玩家子弹, 1=敌机子弹	
    float angle = 5; // 子弹的旋转角度
    int32 owned_id =6;
}

// === 敌机状态 ===
message EnemyState {
    int32 id = 1;      // 敌机唯一ID
    float x = 2;       // 坐标 X
    float y = 3;       // 坐标 Y
    int32 type = 4;    // 敌机类型 (目前只有 0，以后可以加 BOSS)
    int32 health = 5;  // 血量 (可选，用于同步爆炸效果)
}
// === 道具状态 ===
message ItemState {
    int32 id = 1;
    float x = 2;
    float y = 3;
    int32 type = 4; // 0代表加血包，以后还可以加护盾等
}
// 游戏世界快照
message GameSnapshot {
    repeated PlayerState players = 1;
    repeated BulletState bullets = 2;
    repeated EnemyState enemies = 3;  //  敌机列表
repeated ItemState items = 4; //  道具列表
repeated LeaderboardEntry leaderboard = 5; //  全服排行榜
}
// === 排行榜条目 ===
message LeaderboardEntry {
    string name = 1;
    int32 score = 2;
}
// === 用于服务器本地存档的结构 ===
message LeaderboardSaveData {
    repeated LeaderboardEntry entries = 1;
}